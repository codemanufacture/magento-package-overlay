name: Update packages

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - name: Update packages
        run: bash update.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          MSG=$(git diff --cached --name-only | while read -r f; do
            case "$f" in
              *n98-magerun2*) grep 'version = "' pkgs/n98-magerun2/package.nix | sed 's/.*"\(.*\)".*/n98-magerun2 \1/' ;;
              *magento-cache-clean*) grep 'version = "' pkgs/magento-cache-clean/package.nix | sed 's/.*"\(.*\)".*/magento-cache-clean \1/' ;;
            esac
          done | sort -u | paste -sd ', ' -)
          git commit -m "update: $MSG"
          git push
